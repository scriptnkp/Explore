<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบสำรวจข้อมูลหม้อแปลงไฟฟ้า (Explore System)</title>
  
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="main-header">
    <div class="header-container">
      <div class="logo-zone">
        <span class="logo-icon">⚡</span>
        <h1 class="logo-text">ระบบสำรวจข้อมูลหม้อแปลง</h1>
      </div>
      <nav class="nav-tabs">
        <button class="tab-btn active" data-view="home">🏢 เลือกหน่วยงาน</button>
        <button class="tab-btn" data-view="history">📜 ประวัติสำรวจ</button>
        <button class="tab-btn" data-view="dashboard">🗺️ แดชบอร์ดแผนที่</button>
      </nav>
    </div>
  </header>

  <div class="breadcrumb-bar">
    <div class="container">
      <span id="crumb"></span>
    </div>
  </div>

  <main class="main-content">
    <div class="container" id="app">
      <div class="spinner"></div>
    </div>
  </main>

  <div id="toast" class="toast"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <script src="js/config.js"></script>

  <script src="js/app.js"></script>

</body>
</html>
